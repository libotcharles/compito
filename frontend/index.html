<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce TPSI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-flex">
            <span class="logo">🛒 MyShop</span>
            <div>
                <button onclick="switchView('user')" class="btn-nav" id="btn-user">Vista Utente</button>
                <button onclick="switchView('admin')" class="btn-nav" id="btn-admin">Vista Admin</button>
            </div>
        </div>
    </nav>

    <header class="user-bar">
        <div class="container bar-flex">
            <p>👤 <span id="userName">...</span></p>
            <p>💰 Saldo: <span id="userCredits" class="credits">0</span> crediti</p>
        </div>
    </header>

    <main class="container">
        <div id="app" class="grid-container"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
