<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Distribuito - Verifica TPSI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <span class="logo">🛒 MyShop</span>
            <div class="nav-buttons">
                <button class="btn-nav" id="viewUser" onclick="switchView('user')">Vista Utente</button>
                <button class="btn-nav" id="viewAdmin" onclick="switchView('admin')">Vista Admin</button>
            </div>
        </div>
    </nav>

    <header class="user-bar">
        <div class="container">
            <p>Utente: <span id="userName">Caricamento...</span></p>
            <p>Saldo: <span id="userCredits" class="credits">0</span> crediti</p>
        </div>
    </header>

    <main class="container">
        <section id="app" class="grid-container">
            <p class="loading">Inizializzazione catalogo...</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
